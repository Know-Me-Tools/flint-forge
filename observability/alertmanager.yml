# observability/alertmanager.yml — Alertmanager routing and receiver configuration.
#
# Mounted read-only into the alertmanager container at:
#   /etc/alertmanager/alertmanager.yml
#
# OPERATOR ACTION REQUIRED:
#   Set ALERTMANAGER_WEBHOOK_URL in .env to activate alert delivery.
#   Example destinations:
#     Slack:      https://hooks.slack.com/services/T.../B.../...
#     PagerDuty:  https://events.pagerduty.com/v2/enqueue (with routing_key header)
#     Generic:    Any HTTP endpoint that accepts Alertmanager webhook payloads.
#
#   See https://prometheus.io/docs/alerting/latest/configuration/ for full reference.

global:
  # If an alert has not resolved after this period, Alertmanager re-resolves it
  # to prevent stale firing state.
  resolve_timeout: 5m

# ── Routing tree ────────────────────────────────────────────────────────────
route:
  # Default receiver for all alerts not matched by child routes.
  receiver: default

  # Wait this long before firing the first notification for a new alert group.
  group_wait: 30s

  # How long to wait before re-firing a notification for the same alert group
  # after new alerts are added.
  group_interval: 5m

  # Minimum time between repeated notifications for the same alert group.
  repeat_interval: 4h

  # ── Example child routes (uncomment and adapt) ────────────────────────
  # routes:
  #   - match:
  #       severity: critical
  #     receiver: pagerduty
  #     repeat_interval: 1h

# ── Receivers ───────────────────────────────────────────────────────────────
receivers:
  - name: default
    webhook_configs:
      # Replace with your actual webhook URL.
      # Alertmanager will POST a JSON payload to this URL when alerts fire.
      # Leave commented out to silence all notifications until a URL is configured.
      #
      # - url: "${ALERTMANAGER_WEBHOOK_URL}"
      #   send_resolved: true
      #   http_config:
      #     bearer_token: "${ALERTMANAGER_WEBHOOK_TOKEN}"

  # ── PagerDuty example (uncomment and set PAGERDUTY_ROUTING_KEY) ──────────
  # - name: pagerduty
  #   pagerduty_configs:
  #     - routing_key: "${PAGERDUTY_ROUTING_KEY}"
  #       severity: "{{ .CommonLabels.severity }}"

  # ── Slack example (uncomment and set SLACK_WEBHOOK_URL) ─────────────────
  # - name: slack
  #   slack_configs:
  #     - api_url: "${SLACK_WEBHOOK_URL}"
  #       channel: "#alerts"
  #       title: "{{ .GroupLabels.alertname }}"
  #       text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"

# ── Inhibit rules ────────────────────────────────────────────────────────────
# Suppress HighErrorRate and HighP99Latency when ServiceDown is already firing
# for the same job — the downstream alerts are noisy if the service is unreachable.
inhibit_rules:
  - source_match:
      alertname: ServiceDown
      severity: critical
    target_match_re:
      alertname: HighErrorRate|HighP99Latency|HighDbConnections
    equal: [job]
