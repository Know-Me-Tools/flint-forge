# Default values for flint-forge.
# This is a minimal v1.0 chart — production operators should override secrets
# and resource limits via a parent chart or `helm upgrade --set`.

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

# ------------------------------------------------------------------------------
# Postgres (Flint Anvil)
# ------------------------------------------------------------------------------
postgres:
  enabled: true
  image:
    repository: prometheusags/flint-forge-pg
    tag: "18"
    pullPolicy: IfNotPresent
  replicas: 1
  user: flint
  password: flint
  database: flint
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    limits:
      memory: 1Gi
    requests:
      memory: 512Mi
      cpu: 250m

# ------------------------------------------------------------------------------
# fdb-gateway (Quarry)
# ------------------------------------------------------------------------------
gateway:
  enabled: true
  replicaCount: 1
  image:
    repository: prometheusags/flint-forge-gateway
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi
      cpu: 250m
  env:
    FLINT_RATE_LIMIT_REST: "100"
    FLINT_RATE_LIMIT_BURST: "10"
    FLINT_CHANGE_SOURCE: "listen"
    FLINT_LISTEN_CAPACITY: "1024"

# ------------------------------------------------------------------------------
# fke-server (Kiln)
# ------------------------------------------------------------------------------
kiln:
  enabled: true
  replicaCount: 1
  image:
    repository: prometheusags/flint-forge-kiln
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8090
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi
      cpu: 250m
  env:
    KILN_EPOCH_INTERVAL_MS: "10"

# ------------------------------------------------------------------------------
# Backups (p16-c008) — wal-g continuous WAL archiving + scheduled base
# backups for point-in-time recovery, targeting Azure Blob Storage via
# Azure AD Workload Identity — no static storage keys anywhere. The postgres
# pod authenticates as `backup.workloadIdentityClientId` (a federated
# user-assigned managed identity, see docs/runbook.md §13.2) purely through
# its ServiceAccount annotation; wal-g's Azure backend picks up the ambient
# AZURE_CLIENT_ID/AZURE_TENANT_ID/AZURE_FEDERATED_TOKEN_FILE env vars the AKS
# workload-identity webhook injects automatically. See docs/runbook.md §13.
# ------------------------------------------------------------------------------
backup:
  enabled: false
  # Cron schedule (in-cluster time) for the periodic wal-g backup-push base backup.
  schedule: "0 2 * * *"
  # archive_timeout: max seconds Postgres waits before force-switching to a new
  # WAL segment, bounding how much data an interruption could lose (PITR still
  # recovers up to the last archived WAL record, not just the last base backup).
  archiveTimeoutSeconds: 60
  # Azure Storage account (not a secret — the account name alone grants no
  # access; authentication is entirely via Workload Identity below).
  storageAccount: ""
  # Blob container + prefix wal-g archives WAL segments and base backups to,
  # e.g. "azure://pg-backups/<tenant>".
  azPrefix: ""
  # Client ID of the user-assigned managed identity federated to this
  # release's postgres ServiceAccount (system:serviceaccount:<namespace>:
  # <fullname>-postgres). Provision with `az identity federated-credential
  # create` — see docs/runbook.md §13.2. Not a secret; safe to commit.
  workloadIdentityClientId: ""
  # Image providing the `kubectl` CLI for the backup CronJob's exec-trigger container.
  kubectlImage: "bitnami/kubectl:1.31"
  # Automated restore-drill (docs/runbook.md §13.4.3): recurring, unattended
  # proof that backups actually restore, into a throwaway scratch volume —
  # never the live postgres PVC, so this never risks or interrupts
  # production. Replaces the old manual/one-time operator drill.
  restoreDrill:
    enabled: false
    schedule: "0 4 * * 1"   # weekly, Mondays 04:00 in-cluster time
    scratchVolumeSize: 10Gi

# ------------------------------------------------------------------------------
# Secrets
# ------------------------------------------------------------------------------
# In production, create these secrets out-of-band and set `existingSecretName`.
secrets:
  existingSecretName: ""
  jwtSecret: "change-me-in-production"

# ------------------------------------------------------------------------------
# Observability
# ------------------------------------------------------------------------------
metrics:
  enabled: true
  serviceMonitor:
    enabled: false
    interval: 15s
