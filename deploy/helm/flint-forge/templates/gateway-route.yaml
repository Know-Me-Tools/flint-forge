{{- if .Values.ingress.enabled }}
{{- $fullname := include "flint-forge.fullname" . }}
{{- $tlsSecretName := printf "%s-external-tls" $fullname }}
{{- $extGateway := printf "%s-extgw" $fullname }}
# p16-c008: external access via the Kubernetes Gateway API (Envoy Gateway),
# matching every other app on this shared cluster. Named `-extgw` (not
# `-gateway`) to avoid confusion with the `{{ $fullname }}-gateway` Service,
# which is Quarry (fdb-gateway) itself, not this Gateway-API object.
#
# TLS is a single-host certificate issued via HTTP-01 (not the shared
# *.prometheusags.ai wildcard other apps on this cluster use — this domain
# isn't covered by it), so no DNS-01/Azure DNS access is required. See
# docs/runbook.md §13.6 for the DNS record an operator must create pointing
# `.Values.ingress.host` at this cluster's shared Envoy Gateway LoadBalancer
# IP (the same IP every other app's Gateway resolves to).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $tlsSecretName }}
  labels:
    app.kubernetes.io/component: ingress
    {{- include "flint-forge.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ .Values.ingress.host | quote }}
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: {{ .Values.ingress.clusterIssuer }}
  secretName: {{ $tlsSecretName }}
  usages:
    - digital signature
    - key encipherment
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $extGateway }}
  labels:
    app.kubernetes.io/component: ingress
    {{- include "flint-forge.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.ingress.gatewayClassName }}
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      port: 443
      protocol: HTTPS
      hostname: {{ .Values.ingress.host | quote }}
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: {{ $tlsSecretName }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullname }}-http-redirect
  labels:
    app.kubernetes.io/component: ingress
    {{- include "flint-forge.labels" . | nindent 4 }}
spec:
  hostnames:
    - {{ .Values.ingress.host | quote }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $extGateway }}
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullname }}-https
  labels:
    app.kubernetes.io/component: ingress
    {{- include "flint-forge.labels" . | nindent 4 }}
spec:
  hostnames:
    - {{ .Values.ingress.host | quote }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $extGateway }}
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ $fullname }}-gateway
          port: {{ .Values.gateway.service.port }}
          weight: 1
{{- end }}
