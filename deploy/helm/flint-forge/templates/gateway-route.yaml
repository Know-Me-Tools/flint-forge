{{- if .Values.ingress.enabled }}
{{- $fullname := include "flint-forge.fullname" . }}
# p16-c008: external access via HTTPRoutes attached to the cluster's
# pre-existing shared Gateway (Envoy Gateway) in envoy-gateway-system. The
# Gateway object itself — its per-host HTTPS listener and the
# cert-manager Certificate backing it — is provisioned once, out-of-band, by
# cluster ops (one shared Gateway serves every *.prometheusags.ai app on the
# cluster); this chart only ever creates HTTPRoutes, never a Gateway or
# Certificate, to avoid colliding with that shared object. See
# docs/runbook.md §13.9 for the DNS record an operator must create pointing
# `.Values.ingress.host` at the shared Gateway's LoadBalancer IP, and for the
# out-of-band steps to add this host's listener + Certificate before enabling
# this template.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullname }}-http-redirect
  namespace: {{ .Values.ingress.sharedGateway.namespace }}
  labels:
    app.kubernetes.io/component: ingress
    {{- include "flint-forge.labels" . | nindent 4 }}
spec:
  hostnames:
    - {{ .Values.ingress.host | quote }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.ingress.sharedGateway.name }}
      namespace: {{ .Values.ingress.sharedGateway.namespace }}
      sectionName: {{ .Values.ingress.sharedGateway.httpSectionName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullname }}-https
  namespace: {{ .Values.ingress.sharedGateway.namespace }}
  labels:
    app.kubernetes.io/component: ingress
    {{- include "flint-forge.labels" . | nindent 4 }}
spec:
  hostnames:
    - {{ .Values.ingress.host | quote }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.ingress.sharedGateway.name }}
      namespace: {{ .Values.ingress.sharedGateway.namespace }}
      sectionName: {{ .Values.ingress.sharedGateway.httpsSectionName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ $fullname }}-gateway
          namespace: {{ .Release.Namespace }}
          port: {{ .Values.gateway.service.port }}
          weight: 1
{{- end }}
