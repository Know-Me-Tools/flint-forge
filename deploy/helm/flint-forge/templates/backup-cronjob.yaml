{{- if .Values.backup.enabled }}
# p16-c008: Kubernetes-native option for the wal-g PITR backup approach also
# used in docker-compose.prod.yml (see docs/runbook.md §14). Continuous WAL
# archiving is configured on the postgres StatefulSet itself (archive_command
# runs as a local subprocess inside that pod, same as in compose). Periodic
# full base backups run here via a CronJob that `kubectl exec`s into the
# postgres pod to invoke `wal-g backup-push` — this avoids requiring a
# ReadWriteMany storage class for a second pod to share the data volume,
# since `wal-g backup-push` needs local filesystem access to $PGDATA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "flint-forge.fullname" . }}-backup
  labels:
    app.kubernetes.io/component: backup
    {{- include "flint-forge.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "flint-forge.fullname" . }}-backup-exec
  labels:
    app.kubernetes.io/component: backup
    {{- include "flint-forge.labels" . | nindent 4 }}
rules:
  # Scoped to exactly what `kubectl exec` needs — no broader pod/cluster access.
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "flint-forge.fullname" . }}-backup-exec
  labels:
    app.kubernetes.io/component: backup
    {{- include "flint-forge.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "flint-forge.fullname" . }}-backup
roleRef:
  kind: Role
  name: {{ include "flint-forge.fullname" . }}-backup-exec
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "flint-forge.fullname" . }}-backup
  labels:
    app.kubernetes.io/component: backup
    {{- include "flint-forge.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/component: backup
            {{- include "flint-forge.selectorLabels" . | nindent 12 }}
        spec:
          serviceAccountName: {{ include "flint-forge.fullname" . }}-backup
          restartPolicy: Never
          containers:
            - name: backup-trigger
              image: {{ .Values.backup.kubectlImage | quote }}
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  POD="$(kubectl get pods -l app.kubernetes.io/component=postgres,app.kubernetes.io/instance={{ .Release.Name }} -o jsonpath='{.items[0].metadata.name}')"
                  echo "Triggering wal-g backup-push in pod: $POD"
                  kubectl exec "$POD" -c postgres -- wal-g backup-push /var/lib/postgresql/data
{{- end }}
