{{- if not .Values.secrets.existingSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "flint-forge.fullname" . }}-secrets
  labels:
    {{- include "flint-forge.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ .Values.secrets.jwtSecret | required "secrets.jwtSecret is required when existingSecretName is unset" | quote }}
{{- end }}
