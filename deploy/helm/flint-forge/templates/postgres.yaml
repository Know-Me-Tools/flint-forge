{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "flint-forge.fullname" . }}-postgres
  labels:
    app.kubernetes.io/component: postgres
    {{- include "flint-forge.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "flint-forge.fullname" . }}-postgres
  replicas: {{ .Values.postgres.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
      {{- include "flint-forge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
        {{- include "flint-forge.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - containerPort: 5432
              name: postgres
          {{- if .Values.backup.enabled }}
          # p16-c008: continuous WAL archiving via wal-g. archive_command runs
          # as postgres's own subprocess, so no extra container/volume needed
          # here — only the periodic base backup (backup-cronjob.yaml) needs
          # `kubectl exec` into this pod.
          args:
            - "-c"
            - "archive_mode=on"
            - "-c"
            - "archive_command=wal-g wal-push %p"
            - "-c"
            - "archive_timeout={{ .Values.backup.archiveTimeoutSeconds }}"
          {{- end }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            {{- if .Values.backup.enabled }}
            - name: WALG_S3_PREFIX
              value: {{ .Values.backup.s3Prefix | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backup.existingSecretName }}
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backup.existingSecretName }}
                  key: aws-secret-access-key
            {{- end }}
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.user | quote }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.user | quote }}
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.storage.storageClass }}
        storageClassName: {{ .Values.postgres.storage.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "flint-forge.fullname" . }}-postgres
  labels:
    app.kubernetes.io/component: postgres
    {{- include "flint-forge.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app.kubernetes.io/component: postgres
    {{- include "flint-forge.selectorLabels" . | nindent 4 }}
{{- end }}
