{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "flint-forge.fullname" . }}-postgres
  labels:
    app.kubernetes.io/component: postgres
    {{- include "flint-forge.labels" . | nindent 4 }}
  {{- if and .Values.backup.enabled .Values.backup.workloadIdentityClientId }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.backup.workloadIdentityClientId | quote }}
  {{- end }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "flint-forge.fullname" . }}-postgres
  labels:
    app.kubernetes.io/component: postgres
    {{- include "flint-forge.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "flint-forge.fullname" . }}-postgres
  replicas: {{ .Values.postgres.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
      {{- include "flint-forge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
        {{- include "flint-forge.selectorLabels" . | nindent 8 }}
        {{- if and .Values.backup.enabled .Values.backup.workloadIdentityClientId }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      serviceAccountName: {{ include "flint-forge.fullname" . }}-postgres
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - containerPort: 5432
              name: postgres
          {{- if .Values.backup.enabled }}
          # p16-c008: continuous WAL archiving via wal-g. archive_command runs
          # as postgres's own subprocess, so no extra container/volume needed
          # here — only the periodic base backup (backup-cronjob.yaml) needs
          # `kubectl exec` into this pod.
          args:
            - "-c"
            - "archive_mode=on"
            - "-c"
            - "archive_command=wal-g wal-push %p"
            - "-c"
            - "archive_timeout={{ .Values.backup.archiveTimeoutSeconds }}"
          {{- end }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            {{- if .Values.backup.enabled }}
            # No AZURE_CLIENT_ID/AZURE_TENANT_ID/AZURE_FEDERATED_TOKEN_FILE here —
            # the AKS workload-identity mutating webhook injects those automatically
            # onto any pod carrying the azure.workload.identity/use label whose
            # ServiceAccount has the client-id annotation (both set above).
            - name: WALG_AZ_PREFIX
              value: {{ .Values.backup.azPrefix | quote }}
            - name: AZURE_STORAGE_ACCOUNT
              value: {{ .Values.backup.storageAccount | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              # Postgres 18+ images store data under a major-version-specific
              # subdirectory of /var/lib/postgresql itself (not a `data`
              # child mount) — pg_ctlcluster-compatible layout. Mounting at
              # /var/lib/postgresql/data (the pre-18 convention) makes the
              # entrypoint see stray unversioned data there and refuse to
              # start: "PostgreSQL data in: /var/lib/postgresql/data (unused
              # mount/volume)". See docker-library/postgres#1259.
              mountPath: /var/lib/postgresql
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.user | quote }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.user | quote }}
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.storage.storageClass }}
        storageClassName: {{ .Values.postgres.storage.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "flint-forge.fullname" . }}-postgres
  labels:
    app.kubernetes.io/component: postgres
    {{- include "flint-forge.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app.kubernetes.io/component: postgres
    {{- include "flint-forge.selectorLabels" . | nindent 4 }}
{{- end }}
