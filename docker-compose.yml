services:
  db:
    build:
      context: .
      dockerfile: images/postgres18/Dockerfile
    environment:
      POSTGRES_USER: flint
      POSTGRES_PASSWORD: flint
      POSTGRES_DB: flint
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flint -d flint"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  fdb-gateway:
    build:
      context: .
      dockerfile: docker/fdb-gateway/Dockerfile
    env_file:
      - path: .env
        required: false   # operators create .env from .env.example; absent in CI/tests
    environment:
      # Local dev default. In production the entrypoint script overrides this
      # using /run/secrets/postgres_password (mounted via docker-compose.prod.yml).
      DATABASE_URL: postgres://flint:flint@db:5432/flint
      FLINT_JWT_SECRET: ${FLINT_JWT_SECRET:-change-me-in-production}
      # Explicit (matches the code default as of p16-c004): Postgres LISTEN/NOTIFY
      # change-stream source for GraphQL subscriptions. `fabric` (FRF gRPC) still
      # returns an empty stream pending OQ-FRF-1 — do not select it here.
      FLINT_CHANGE_SOURCE: listen
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  fke-server:
    build:
      context: .
      dockerfile: docker/fke-server/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      # Local dev default. In production the entrypoint script overrides this
      # using /run/secrets/postgres_password (mounted via docker-compose.prod.yml).
      DATABASE_URL: postgres://flint:flint@db:5432/flint
    ports:
      - "8090:8090"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
