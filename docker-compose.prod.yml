# docker-compose.prod.yml — production overlay for flint-forge
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file extends docker-compose.yml with:
#   - TLS termination via Caddy (automatic Let's Encrypt / ACME)
#   - Restart policies for process resilience
#   - CPU / memory resource limits
#   - Production-appropriate log drivers
#   - Public ports removed from fdb-gateway and fke-server (traffic via Caddy only)
#   - Docker secrets for jwt_secret, postgres_password, caddy_tls_email
#   - Shell entrypoints that build DATABASE_URL + FLINT_JWT_SECRET from secret files
#
# Prerequisites:
#   1. Run scripts/rotate_secrets.sh to generate secrets/ files.
#   2. Set FLINT_DOMAIN and CADDY_TLS_EMAIL in .env (or export them).
#   3. The entrypoint scripts will build DATABASE_URL from the postgres_password
#      secret — no .env file is required on the production host.

# ── Secret file declarations ────────────────────────────────────────────────
# Secret files are created by scripts/rotate_secrets.sh and are never committed.
# Each service below declares which secrets it needs mounted under /run/secrets/.

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  caddy_tls_email:
    file: ./secrets/caddy_tls_email.txt
  # p16-c008: wal-g S3-compatible object storage credentials for continuous
  # WAL archiving + scheduled base backups (see docs/runbook.md §13.4). Absent
  # by default — `db`'s entrypoint-walg.sh and the `backup` service both
  # no-op cleanly if these files don't exist (local dev / CI / staging).
  walg_s3_access_key:
    file: ./secrets/walg_s3_access_key.txt
  walg_s3_secret_key:
    file: ./secrets/walg_s3_secret_key.txt

services:
  db:
    restart: unless-stopped
    # p10-c002: The official postgres image reads POSTGRES_PASSWORD_FILE if set,
    # which allows us to supply the password via Docker secret rather than env var.
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      # Override the hardcoded password in the base compose — DB now reads from the file.
      POSTGRES_PASSWORD: ""
      # p16-c008: wal-g continuous WAL archiving target + region. Empty by
      # default (archive_command below then fails loudly per WAL segment
      # instead of silently discarding WAL — see docs/runbook.md §13.4 for why
      # that's the intentional fail-closed behavior, not a bug). Operator sets
      # these once the S3-compatible backup target is provisioned.
      WALG_S3_PREFIX: ${WALG_S3_PREFIX:-}
      AWS_REGION: ${WALG_AWS_REGION:-}
    secrets:
      - postgres_password
      - walg_s3_access_key
      - walg_s3_secret_key
    # p16-c008: adds archive_mode/archive_command for wal-g continuous WAL
    # archiving to the base image's CMD (docker-compose `command:` replaces
    # the Dockerfile CMD entirely, so every base flag is repeated here).
    # `archive_timeout` bounds how long a lightly-loaded DB can go without an
    # archived segment (a fully-synchronous, low-write instance could
    # otherwise wait indefinitely between "natural" segment switches).
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - shared_preload_libraries=pg_net,pg_cron,flint_llm
      - -c
      - cron.database_name=flint
      - -c
      - archive_mode=on
      - -c
      - archive_command=wal-g wal-push %p
      - -c
      - archive_timeout=60
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    # p16-c008: continuous WAL archiving + scheduled base backups (via the
    # `backup` service below) are now automated once wal-g S3 credentials are
    # provisioned (§13.4.2). This caveat stays until an operator has run and
    # RECORDED a restore drill (§13.4.3 — no row in that table yet) proving
    # backups actually restore, not just that files land in object storage.
    # Until then, still prefer a managed database with built-in PITR for
    # production.

  # p16-c008: scheduled wal-g base backups. Runs the same pinned image as `db`
  # (wal-g is already installed there) against a read-only mount of the same
  # data volume, connecting to `db` over the network to drive the
  # START_BACKUP/STOP_BACKUP protocol — this is the periodic full-backup half
  # of PITR; `db`'s archive_command above is the continuous-WAL half. See
  # docs/runbook.md §13.4 for the restore procedure and drill requirement.
  backup:
    build:
      context: .
      dockerfile: images/postgres18/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - postgres_data:/var/lib/postgresql/data:ro
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: flint
      PGDATABASE: flint
      WALG_S3_PREFIX: ${WALG_S3_PREFIX:-}
      AWS_REGION: ${WALG_AWS_REGION:-}
      WALG_BACKUP_INTERVAL_SECS: ${WALG_BACKUP_INTERVAL_SECS:-86400}
    secrets:
      - postgres_password
      - walg_s3_access_key
      - walg_s3_secret_key
    entrypoint: ["/usr/local/bin/backup-loop.sh"]

  fdb-gateway:
    restart: unless-stopped
    # p10-c001: Remove the public HTTP port — all traffic must flow through Caddy.
    # Caddy reaches fdb-gateway on the internal Docker network (fdb-gateway:8080).
    ports: !reset []
    # p10-c002: Mount jwt_secret and postgres_password.
    # p11-c005: DATABASE_URL and FLINT_JWT_SECRET are now set by the entrypoint
    # script from /run/secrets/postgres_password and /run/secrets/jwt_secret.
    # No FLINT_JWT_SECRET_FILE annotation needed — the entrypoint handles this.
    environment:
      RUST_LOG: info
      # Explicit (matches the code default as of p16-c004): Postgres LISTEN/NOTIFY
      # change-stream source for GraphQL subscriptions. `fabric` (FRF gRPC) still
      # returns an empty stream pending OQ-FRF-1 — do not select it here.
      FLINT_CHANGE_SOURCE: listen
    secrets:
      - jwt_secret
      - postgres_password
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  fke-server:
    restart: unless-stopped
    # p10-c001: Remove the public HTTP port — Kiln is internal-only in production.
    # Expose via Caddy reverse_proxy or a dedicated subdomain if needed.
    ports: !reset []
    # p10-c002: Mount postgres_password secret.
    secrets:
      - postgres_password
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    environment:
      RUST_LOG: info
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # p10-c001: Caddy — TLS-terminating reverse proxy with automatic ACME cert provisioning.
  # Obtains a Let's Encrypt certificate for FLINT_DOMAIN on first startup and renews it
  # automatically 30 days before expiry.  Cert data is persisted in caddy_data volume.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    # p10-c002: caddy_tls_email secret is mounted but Caddy reads CADDY_TLS_EMAIL from env.
    # The secret file is provided for operators who prefer to read it via a custom Caddyfile.
    environment:
      FLINT_DOMAIN: ${FLINT_DOMAIN:?FLINT_DOMAIN is required for TLS cert provisioning}
      CADDY_TLS_EMAIL: ${CADDY_TLS_EMAIL:?CADDY_TLS_EMAIL is required for ACME registration}
    secrets:
      - caddy_tls_email
    depends_on:
      - fdb-gateway
      - fke-server
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # p10-c004: Prometheus — scrapes /metrics from fdb-gateway and fke-server every 15 s.
  # Evaluates alerting rules and forwards firing alerts to Alertmanager.
  prometheus:
    image: prom/prometheus:v3.0.0
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.rules.yml:/etc/prometheus/alerts.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'     # allows hot-reload via POST /-/reload
    depends_on:
      - fdb-gateway
      - fke-server
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # p10-c004: Alertmanager — receives alerts from Prometheus and routes them to
  # the operator-configured webhook (Slack, PagerDuty, etc.).
  # Port 9093 is bound to 127.0.0.1 only — not exposed to the public internet.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "127.0.0.1:9093:9093"
    depends_on:
      - prometheus
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  # Persists TLS certificates and ACME account data across container restarts.
  caddy_data:
  # Persists Caddy's runtime configuration (fast-start optimisation).
  caddy_config:
  # Persists Prometheus TSDB time-series data (15-day retention configured below).
  prometheus_data:
