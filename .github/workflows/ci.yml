name: CI
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch: {}

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # p16-c009: full history needed so scripts/check_coverage.sh can diff
          # against the PR base ref to determine which crates changed.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      # p16-c009: coverage gate — >=90% line coverage on crates this PR
      # touches (not workspace-wide, to avoid punishing legacy low-coverage
      # areas in one PR); workspace-wide total is always printed as a metric.
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Coverage gate
        run: bash scripts/check_coverage.sh
      # p16-c009: license + advisory policy, alongside the existing cargo-audit
      # advisory-only gate below. See deny.toml for the allowed-license list
      # and any explicitly-permitted exceptions.
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: License + advisory policy (cargo-deny)
        run: cargo deny check licenses advisories
      # p10-c003: Security advisory gate. Fails on any unfixed advisory with
      # CVSS >= 7.0 that is not in .cargo/audit.toml allowlist.
      # Allowlisted: quick-xml (DoS via operator-controlled S3), rsa/sqlx-mysql
      # (PostgreSQL-only codebase), two unmaintained indirect deps.
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Security audit
        run: cargo audit
      # p13-c004: API version consistency gate.
      # Verifies the version integer in docs/api/a2ui.md and docs/api/kiln-abi.md
      # matches FLINT_A2UI_API_VERSION and FLINT_KILN_ABI_VERSION in .env.example.
      # Breaking API changes must update BOTH in the same commit.
      # See docs/api/versioning.md for the full policy.
      - name: API version check
        run: bash scripts/check_api_versions.sh
      - name: Install cargo-component
        run: cargo install cargo-component --locked
      - name: Build hello-component
        run: cargo component build -p hello-component

# ── Postgres integration tests ────────────────────────────────────────────────
# p15-c004: Builds the pinned Postgres 18 image (with all five Anvil pgrx
# extensions) and runs the DATABASE_URL-gated integration tests against it.
# This job is independent of the unit-test Rust job so the longer image build
# does not block fmt/clippy/check.
  integration:
    name: Postgres integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Postgres 18 + Anvil image
        run: docker build -t flint-forge-pg:18 -f images/postgres18/Dockerfile .

      - name: Start Postgres
        run: |
          docker run -d --name flint-db -p 5432:5432 \
            -e POSTGRES_USER=flint \
            -e POSTGRES_PASSWORD=flint \
            -e POSTGRES_DB=flint \
            flint-forge-pg:18
          for i in $(seq 1 30); do
            if docker exec flint-db pg_isready -U flint -d flint >/dev/null 2>&1; then
              echo "Postgres ready after ${i} tries"
              exit 0
            fi
            sleep 2
          done
          echo "Postgres failed to become ready" >&2
          docker logs flint-db >&2
          exit 1

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://flint:flint@localhost:5432/flint
        run: ./scripts/ci-test.sh

# ── Performance regression gate ───────────────────────────────────────────────
# p16-c008: there is no separate "staging" host — the only environment that
# exists short of a real client deployment is this repo's own
# docker-compose.yml stack, so that's what gets measured. Runs automatically
# on every push to main (self-updating baseline) and on manual dispatch;
# skipped on PRs to keep PR CI fast. handleSummary() in regression.js emits
# perf-summary.json with the measured p99s, which this job uses to rewrite
# its own thresholds/BASELINE_DATE/BASELINE_SOURCE and commit the result —
# no human runs this by hand.
  performance:
    name: k6 Performance Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg \
            < <(curl -fsSL https://dl.k6.io/key.gpg)
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6

      - name: Start the stack (docker-compose.yml — the only 'staging' that exists)
        run: docker compose -f docker-compose.yml up -d --build

      - name: Wait for stack healthy
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/healthz > /dev/null && \
            curl -sf http://localhost:8090/healthz > /dev/null && \
            echo "Stack healthy" && exit 0
            echo "Waiting ($i/60)..."; sleep 3
          done
          echo "Timed out waiting for stack" >&2
          docker compose -f docker-compose.yml logs --tail 200
          exit 1

      - name: Mint smoke token
        run: |
          chmod +x scripts/mint_smoke_token.sh
          echo "SMOKE_TOKEN=$(JWT_SECRET=change-me-in-production ./scripts/mint_smoke_token.sh)" >> "$GITHUB_ENV"

      - name: Run regression suite
        env:
          BASE_URL: http://localhost:8080
          TOKEN: ${{ env.SMOKE_TOKEN }}
        run: k6 run perf/k6/regression.js

      - name: Record results
        id: record
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          RESULTS_FILE="perf/results/${DATE}-docker-compose-ci.json"
          mkdir -p perf/results
          cp perf-summary.json "$RESULTS_FILE"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

          python3 - "$RESULTS_FILE" "$DATE" <<'PYEOF'
          import json, re, sys, math
          results_file, date = sys.argv[1], sys.argv[2]
          summary = json.load(open(results_file))
          reg_path = "perf/k6/regression.js"
          src = open(reg_path).read()
          for endpoint, p99 in summary.items():
              if p99 is None:
                  continue
              threshold = math.ceil(p99 * 1.20 / 5) * 5  # round up to nearest 5ms
              pattern = re.compile(
                  r"('http_req_duration\{endpoint:%s\}':\s*\['p\(99\)<)\d+(']),.*" % re.escape(endpoint)
              )
              replacement = r"\g<1>%d\g<2>,   // measured %.1f ms × 1.20, %s docker-compose CI" % (threshold, p99, date)
              src, n = pattern.subn(replacement, src)
              if n == 0:
                  print(f"::warning::no threshold line matched for endpoint '{endpoint}' — leaving as-is")
          src = re.sub(r"const BASELINE_DATE\s*=\s*'[^']*';", f"const BASELINE_DATE   = '{date}';", src)
          src = re.sub(
              r"const BASELINE_SOURCE\s*=\s*'[^']*';",
              "const BASELINE_SOURCE = 'docker-compose.yml stack, measured in CI (.github/workflows/ci.yml performance job)';",
              src,
          )
          open(reg_path, "w").write(src)
          print(f"Updated thresholds from {results_file}: {summary}")
          PYEOF

      - name: Stop the stack
        if: always()
        run: docker compose -f docker-compose.yml down -v

      - name: Commit updated baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add perf/results/ perf/k6/regression.js
          if git diff --cached --quiet; then
            echo "No measurable change — nothing to commit."
            exit 0
          fi
          git commit -m "perf: update k6 regression thresholds from ${{ steps.record.outputs.date }} docker-compose CI run [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
