name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: staging
        type: choice
        options:
          - staging
      tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        default: latest

# Prevent concurrent deploys to the same environment.
concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Write the SSH private key to an agent-loaded file ──────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}

      # ── Copy compose files to the staging host ─────────────────────────────
      - name: Upload compose files
        run: |
          scp -i ~/.ssh/deploy_key \
              docker-compose.yml \
              docker-compose.staging.yml \
              .env.example \
              "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:~/flint-forge/"
        env:
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}

      # ── Pull images and bring the stack up ─────────────────────────────────
      - name: Deploy stack
        run: |
          ssh -i ~/.ssh/deploy_key \
              "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
              "cd ~/flint-forge && \
               TAG=${{ inputs.tag }} \
               REGISTRY=ghcr.io/${{ github.repository_owner }}/flint-forge \
               docker compose \
                 -f docker-compose.yml \
                 -f docker-compose.staging.yml \
                 pull --quiet && \
               TAG=${{ inputs.tag }} \
               REGISTRY=ghcr.io/${{ github.repository_owner }}/flint-forge \
               docker compose \
                 -f docker-compose.yml \
                 -f docker-compose.staging.yml \
                 up -d --remove-orphans"
        env:
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}

      # ── Wait for services to become healthy ────────────────────────────────
      - name: Wait for stack healthy
        run: |
          ssh -i ~/.ssh/deploy_key \
              "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
              "for i in \$(seq 1 30); do \
                 curl -sf http://localhost:8080/healthz > /dev/null && \
                 curl -sf http://localhost:8090/healthz > /dev/null && \
                 echo 'Stack healthy' && exit 0; \
                 echo \"Waiting (\$i/30)...\"; sleep 2; \
               done; echo 'Timed out waiting for stack'; exit 1"
        env:
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}

      # ── Copy and run smoke tests on the host ──────────────────────────────
      - name: Copy smoke test
        run: |
          scp -i ~/.ssh/deploy_key \
              scripts/smoke_test.sh \
              "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:~/flint-forge/smoke_test.sh"
        env:
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}

      - name: Run smoke tests
        run: |
          ssh -i ~/.ssh/deploy_key \
              "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
              "cd ~/flint-forge && \
               chmod +x smoke_test.sh && \
               BASE_URL=http://localhost:8080 \
               KILN_URL=http://localhost:8090 \
               SMOKE_TOKEN='${{ secrets.STAGING_SMOKE_TOKEN }}' \
               ./smoke_test.sh"
        env:
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}

      # ── Clean up key from runner ────────────────────────────────────────────
      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      # ── Announce outcome ───────────────────────────────────────────────────
      - name: Deploy summary
        if: success()
        run: |
          echo "### Deploy complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ inputs.environment }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image tag   | ${{ inputs.tag }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit      | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
