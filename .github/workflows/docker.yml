name: Docker
on:
  push:
    branches: [main]
    # p12-c002: also trigger on version tags so ghcr.io images are published
    # with the version label (e.g. flint-gateway:v1.0.0) on every release.
    tags: ['v[0-9]*']

jobs:
  gateway:
    name: Build and push fdb-gateway
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase repository owner
        id: repo
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/fdb-gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/flint-gateway:latest
            ghcr.io/${{ steps.repo.outputs.owner }}/flint-gateway:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.owner }}/flint-gateway:${{ github.ref_name }}

  kiln:
    name: Build and push fke-server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase repository owner
        id: repo
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/fke-server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/flint-kiln:latest
            ghcr.io/${{ steps.repo.outputs.owner }}/flint-kiln:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.owner }}/flint-kiln:${{ github.ref_name }}
