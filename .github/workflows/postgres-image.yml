name: Postgres image

# Build and push the custom Postgres 18 + Anvil extensions image to Docker Hub.
# Triggered manually, on a weekly schedule, or when Postgres image sources change.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME  - Docker Hub user or organization name (tribehealth)
#   DOCKERHUB_TOKEN     - Docker Hub personal access token with push scope
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'images/postgres18/**'
      - 'crates/ext-flint-*/**'
      - '.github/workflows/postgres-image.yml'
  schedule:
    # Rebuild weekly so the base Postgres 18 image stays current on security patches.
    - cron: '17 4 * * 0'

jobs:
  build:
    name: Build and push ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.platform }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/postgres18/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          tags: |
            tribehealth/flint-forge-pg:${{ github.sha }}-${{ matrix.suffix }}
            tribehealth/flint-forge-pg:18-${{ matrix.suffix }}
            tribehealth/flint-forge-pg:latest-${{ matrix.suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  manifest:
    name: Create multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          for tag in "${{ github.sha }}" "18" "latest"; do
            docker buildx imagetools create \
              -t "tribehealth/flint-forge-pg:${tag}" \
              "tribehealth/flint-forge-pg:${tag}-amd64" \
              "tribehealth/flint-forge-pg:${tag}-arm64"
          done
