name: Postgres image

# Build and push the custom Postgres 18 + Anvil extensions image to Docker Hub.
# Triggered manually, on a weekly schedule, or when Postgres image sources change.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME  - Docker Hub user or organization name (tribehealth)
#   DOCKERHUB_TOKEN     - Docker Hub personal access token with push scope
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'images/postgres18/**'
      - 'crates/ext-flint-*/**'
      - '.github/workflows/postgres-image.yml'
  schedule:
    # Rebuild weekly so the base Postgres 18 image stays current on security patches.
    - cron: '17 4 * * 0'

jobs:
  postgres:
    name: Build and push flint-forge-pg:18
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/postgres18/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            tribehealth/flint-forge-pg:18
            tribehealth/flint-forge-pg:${{ github.sha }}
            tribehealth/flint-forge-pg:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
